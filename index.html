<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Minimart | Shop Smart, Live Better</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Minimart is your one-stop online store for quality products at the best prices. Shop smart, live better."
    />
    <meta
      name="keywords"
      content="Minimart, Online Shopping, Ecommerce Store, Buy Online India, Best Deals, Grocery, Electronics"
    />
    <meta name="author" content="Minimart Team" />

    <!-- App Identity -->
    <meta name="application-name" content="Minimart" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Minimart | Shop Smart, Live Better" />
    <meta
      property="og:description"
      content="Shop top-quality products at unbeatable prices. Minimart makes online shopping simple and fast."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Minimart" />
    <!-- Optional: Add when you have a banner image -->
    <!-- <meta property="og:image" content="/og-image.png" /> -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Minimart | Shop Smart, Live Better" />
    <meta
      name="twitter:description"
      content="Shop top-quality products at unbeatable prices with Minimart."
    />
    <!-- <meta name="twitter:image" content="/og-image.png" /> -->

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ================= Favicons ================= -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android Chrome Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />

    <!-- Web App Manifest (PWA support) -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Prevent favicon cache issues -->
    <link rel="shortcut icon" href="/favicon-32x32.png" />

  </head>

  <body>
    <div id="root"></div>

    <!-- Vite Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
